<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tier List Maker Mobile Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        body { background: #111827; color: white; padding: 15px; }
        
        h1 { text-align: center; margin-bottom: 15px; font-size: 1.5rem; color: #f3f4f6; }

        .header-btns { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 12px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        
        .btn-edit { background: #4b5563; color: white; }
        body.edit-mode .btn-edit { background: #10b981; }
        
        .btn-add { background: #3b82f6; color: white; display: none; }
        body.edit-mode .btn-add { display: block; }

        .upload-label { background: #6b7280; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #tier-container { display: flex; flex-direction: column; gap: 10px; }
        .tier { display: flex; min-height: 90px; border-radius: 10px; overflow: hidden; background: #1f2937; border: 2px solid transparent; }
        body.edit-mode .tier { border-color: #374151; }

        .label { width: 90px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; font-size: 18px; padding: 5px; overflow-wrap: anywhere; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .images { flex: 1; display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; min-height: 90px; }
        
        img { width: 75px; height: 75px; object-fit: cover; border-radius: 6px; cursor: grab; position: relative; z-index: 10; touch-action: none; }
        
        .edit-panel { display: none; width: 130px; background: #374151; padding: 8px; flex-direction: column; gap: 6px; border-left: 1px solid #4b5563; }
        body.edit-mode .edit-panel { display: flex; }
        .edit-panel input { width: 100%; padding: 6px; border-radius: 4px; border: none; font-size: 14px; }

        .pool-title { margin-top: 25px; color: #9ca3af; font-size: 1.1rem; margin-bottom: 10px; }
        .pool { background: #1f2937; min-height: 150px; padding: 15px; border-radius: 12px; display: flex; flex-wrap: wrap; gap: 10px; border: 2px dashed #4b5563; margin-bottom: 50px; }
    </style>
</head>
<body class="">

    <h1>Tier List Maker</h1>

    <div class="header-btns">
        <label class="upload-label">
            📥 Images <input type="file" id="upload" multiple accept="image/*" style="display:none;">
        </label>
        <button class="btn-edit" onclick="document.body.classList.toggle('edit-mode')">⚙️ Mode Édition</button>
        <button class="btn-add" onclick="addTier()">➕ Ajouter un rang</button>
    </div>

    <div id="tier-container"></div>
    
    <h3 class="pool-title">Réserve d'images</h3>
    <div class="pool" id="pool"></div>

    <script>
        let draggedImg = null;

        function createTier(name, color) {
            const div = document.createElement("div");
            div.className = "tier";
            div.innerHTML = `
                <div class="label" style="background:${color}">${name}</div>
                <div class="images" ondragover="event.preventDefault()" ondrop="handleDrop(event)"></div>
                <div class="edit-panel">
                    <input type="text" value="${name}" oninput="this.closest('.tier').querySelector('.label').textContent=this.value">
                    <input type="color" value="${color}" oninput="this.closest('.tier').querySelector('.label').style.background=this.value">
                    <button onclick="deleteTier(this)" style="background:#ef4444; color:white; border-radius:4px; padding:5px; font-size:12px;">Supprimer</button>
                </div>
            `;
            document.getElementById("tier-container").appendChild(div);
        }

        function addTier() { createTier("Nouveau", "#6b7280"); }
        
        function deleteTier(btn) {
            const t = btn.closest(".tier");
            const imgs = t.querySelectorAll("img");
            imgs.forEach(i => document.getElementById("pool").appendChild(i));
            t.remove();
        }

        // --- Drag & Drop PC ---
        document.addEventListener("dragstart", e => { if(e.target.tagName === 'IMG') draggedImg = e.target; });
        function handleDrop(e) {
            e.preventDefault();
            const target = e.target.closest(".images, .pool");
            if(target && draggedImg) target.appendChild(draggedImg);
        }

        // --- Drag & Drop Mobile (Touch) ---
        document.addEventListener("touchstart", e => {
            if(e.target.tagName === 'IMG') {
                draggedImg = e.target;
                draggedImg.style.opacity = "0.6";
            }
        }, {passive: false});

        document.addEventListener("touchmove", e => {
            if(!draggedImg) return;
            e.preventDefault(); 
            const touch = e.touches[0];
            draggedImg.style.position = "fixed";
            draggedImg.style.left = (touch.clientX - 37) + "px";
            draggedImg.style.top = (touch.clientY - 37) + "px";
        }, {passive: false});

        document.addEventListener("touchend", e => {
            if(!draggedImg) return;
            draggedImg.style.opacity = "1";
            draggedImg.style.position = "static";
            
            const touch = e.changedTouches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY)?.closest(".images, .pool");
            
            if(target) {
                target.appendChild(draggedImg);
            }
            draggedImg = null;
        });

        // --- Upload ---
        document.getElementById("upload").addEventListener("change", e => {
            [...e.target.files].forEach(file => {
                const img = document.createElement("img");
                img.src = URL.createObjectURL(file);
                img.id = "img-" + Math.random().toString(36).substr(2, 9);
                img.draggable = true;
                document.getElementById("pool").appendChild(img);
            });
        });

        // Initialisation par défaut
        const start = [
            {n:"S", c:"#ff7f7f"},
            {n:"A", c:"#ffbf7f"},
            {n:"B", c:"#ffff7f"},
            {n:"C", c:"#7fff7f"}
        ];
        window.onload = () => start.forEach(d => createTier(d.n, d.c));
    </script>
</body>
</html>
